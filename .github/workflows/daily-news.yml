# ============================================================
# AI News Collector Bot - 日次ニュース配信ワークフロー
#
# 毎朝 6:00 (JST) = 21:00 (UTC前日) に自動実行し、
# AIニュースを収集・変換・配信する。
# 手動実行 (workflow_dispatch) にも対応。
# ============================================================

name: Daily AI News Collection

on:
  schedule:
    # UTC 21:00 = JST 翌日 06:00
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "対象日付 (YYYY-MM-DD)。空欄なら当日。"
        required: false
        type: string
      dry_run:
        description: "配信をスキップしてMarkdown生成のみ"
        required: false
        type: boolean
        default: false

# 同時実行を防止（前回がまだ動いていたらスキップ）
concurrency:
  group: daily-news
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect-and-deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ai-news-bot/requirements.txt

      - name: 依存パッケージをインストール
        working-directory: ai-news-bot
        run: pip install -r requirements.txt

      - name: 実行引数を組み立て
        id: build-args
        run: |
          ARGS=""
          DATE="${{ inputs.date }}"
          DRY_RUN="${{ inputs.dry_run }}"
          if [ -n "$DATE" ]; then
            # 日付形式バリデーション (YYYY-MM-DD)
            if echo "$DATE" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
              ARGS="$ARGS --date $DATE"
            else
              echo "::error::Invalid date format: $DATE (expected YYYY-MM-DD)"
              exit 1
            fi
          fi
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: ニュース収集・変換・配信を実行
        working-directory: ai-news-bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          PYTHONPATH: "."
          TZ: "Asia/Tokyo"
        run: python -m src.main ${{ steps.build-args.outputs.args }}

      - name: 生成されたMarkdownをコミット・プッシュ
        if: success()
        env:
          TZ: "Asia/Tokyo"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # knowledge_base ディレクトリが存在する場合のみ add を実行
          if [ -d "ai-news-bot/knowledge_base" ]; then
            git add ai-news-bot/knowledge_base/
          else
            echo "knowledge_base ディレクトリが存在しません。スキップします。"
          fi
          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            JST_DATE=$(date +%Y-%m-%d)
            git commit -m "docs: ${JST_DATE} の日次AIニュースを追加"
            git push
          fi

      - name: ログをアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: ai-news-bot/logs/
          retention-days: 14
          if-no-files-found: ignore
